events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 1. Принудительный редирект с HTTP на безопасный HTTPS сайта
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # 2. Сервер Студии Интерьера (Порт 443 — только Чат и Статика)
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/live.crt;
        ssl_certificate_key /etc/nginx/certs/live.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            root /usr/share/nginx/html/ai-assistant;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }

    # 3. Выделенный сервер для n8n (Порт 8443 — Безопасный вход без конфликтов путей)
    server {
        listen 8443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/live.crt;
        ssl_certificate_key /etc/nginx/certs/live.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://pipeline_n8n:5678;
            
            # Поддержка WebSockets
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";

            # Ваша CSRF защита
            proxy_set_header Origin $scheme://$http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            keepalive_timeout  600s;
            proxy_buffering    off;
        }
    }

    # 4. Сервер для Grafana (Порт 3000)
    server {
        listen 3000 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/live.crt;
        ssl_certificate_key /etc/nginx/certs/live.key;

        location / {
            proxy_pass http://pipeline_grafana:3000;
        }
    }
}
