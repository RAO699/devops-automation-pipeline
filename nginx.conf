events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Глобальные базовые заголовки проксирования
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 1. Принудительный редирект с HTTP на безопасный HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # 2. Главный защищенный сервер HTTPS (порт 443 — для n8n)
    server {
        listen 443 ssl;
        server_name _;

        # Пути к SSL-сертификатам внутри контейнера
        ssl_certificate     /etc/nginx/certs/live.crt;
        ssl_certificate_key /etc/nginx/certs/live.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Маршрутизация n8n с жесткой подменой Origin для авторизации WebSockets
        location / {
            proxy_pass http://n8n:5678;
            
            # Включение поддержки WebSockets (живой интерфейс n8n)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";

            # === СТАТИЧЕСКАЯ ПОДМЕНА ХЕДЕРОВ ДЛЯ ЗАЩИТЫ ОТ CSRF DISCONNECT ===
            proxy_set_header Origin $scheme://$http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            
            # DevOps-таймауты ожидания ИИ-ответов (10 минут)
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            keepalive_timeout  600s;
            proxy_buffering    off;
        }
    }

    # 3. Сервер для Grafana (порт 3000)
    server {
        listen 3000 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/live.crt;
        ssl_certificate_key /etc/nginx/certs/live.key;

        location / {
            proxy_pass http://grafana:3000;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
